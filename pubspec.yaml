name: flip_card_game
description: "A new Flutter project."
version: 1.0.0+1

environment:
  sdk: ^3.10.0
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get: ^4.7.3
  lottie: ^3.3.3
  cached_network_image: ^3.4.1
  flutter_screenutil: ^5.9.3
  share_plus: ^13.1.0
  google_fonts: ^8.1.0
  lightning_overlay: ^1.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
flutter:

  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/games/
    - assets/lotties/
    - assets/images/games/icons/

  
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/en/InterRegular.ttf     
  #  - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
